name: Backtest Only

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 1-5"

permissions:
  contents: write

concurrency:
  group: backtest-only
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtest only
        run: |
          python -m src.run_backtest_only

      - name: Preflight size check
        run: |
          echo "Data file sizes:"
          du -h docs/data/* | sort -h || true
          raw_outputs="docs/data/backtest_trades.csv docs/data/signal_diagnostics.csv docs/data/backtest_skipped.csv"
          for raw_output in $raw_outputs; do
            if [ -e "$raw_output" ]; then
              echo "Raw backtest output must not be committed: $raw_output"
              exit 1
            fi
          done
          too_large=$(find docs/data -type f -size +45M | tr '\n' ' ')
          if [ -n "$too_large" ]; then
            echo "Files larger than 45MB: $too_large"
            exit 1
          fi

      - name: Commit backtest data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          rm -f docs/data/backtest_trades.csv docs/data/signal_diagnostics.csv docs/data/backtest_skipped.csv
          raw_outputs="docs/data/backtest_trades.csv docs/data/signal_diagnostics.csv docs/data/backtest_skipped.csv"
          for raw_output in $raw_outputs; do
            if git ls-files --error-unmatch "$raw_output" >/dev/null 2>&1; then
              git add -u -- "$raw_output"
            fi
          done
          git add docs/data/backtest_summary.json docs/data/backtest_strategy_summary.csv
          git add docs/data/backtest_recent_trades.csv docs/data/signal_diagnostics_summary.csv docs/data/backtest_skipped_summary.csv
          git commit -m "Update backtest data" || echo "No changes to commit"
          git push
