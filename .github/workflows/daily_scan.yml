name: Daily ETF Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * 1-5"

permissions:
  contents: write

concurrency:
  group: data-publish-main
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETF scan
        run: |
          python -m src.run_daily_scan
          python src/postprocess_groups.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          rm -f docs/data/backtest_trades.csv docs/data/signal_diagnostics.csv docs/data/backtest_skipped.csv
          # Backtest Only owns these published outputs; discard compatibility updates from the daily run.
          git restore --worktree -- docs/data/backtest_summary.json docs/data/backtest_strategy_summary.csv
          git restore --worktree -- docs/data/backtest_recent_trades.csv docs/data/signal_diagnostics_summary.csv docs/data/backtest_skipped_summary.csv
          git add config/aum.csv
          git add docs/data/latest.json docs/data/latest.csv docs/data/universe_current.csv docs/data/excluded_etfs_summary.csv
          git add docs/data/history || true
          git commit -m "Update ETF scan data" || echo "No changes to commit"
          git pull --rebase --autostash origin main
          git push
