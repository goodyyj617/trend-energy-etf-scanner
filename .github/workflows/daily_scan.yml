name: Daily ETF Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "30 21 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETF scan
        run: |
          python -m src.run_daily_scan
          python src/postprocess_groups.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/data config/aum.csv
          git commit -m "Update ETF scan data" || echo "No changes to commit"
          git push
